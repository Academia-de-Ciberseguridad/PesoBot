# ============================================================================
# OAIF · Lab Sesión 1 · PesoBot Vulnerable
# Academia de Ciberseguridad LATAM
# ============================================================================
# Stack para demo en vivo de las 5 vulnerabilidades OWASP LLM
# en el chatbot bancario LATAM "PesoBot".
#
# Levantar todo: docker compose up -d
# Logs:          docker compose logs -f pesobot-api
# Detener:       docker compose down
# ============================================================================

services:

  # ========================================================================
  # PesoBot API · Backend FastAPI con las 5 vulnerabilidades intencionales
  # ========================================================================
  pesobot-api:
    build:
      context: ./pesobot-api
      dockerfile: Dockerfile
    container_name: pesobot-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # === LLM Provider (elegir UNO) ===
      # Opciones: openai | anthropic | ollama
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}

      # OpenAI (default)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}

      # Anthropic
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-haiku-20241022}

      # Ollama (si quieres usar tu Ollama local desde el VPS, pon la URL pública)
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}

      # === Configuración de la app ===
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379

      # === Modo vulnerable (siempre true en este lab) ===
      VULNERABLE_MODE: "true"

      # === Logging ===
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./pesobot-api/data:/app/data
      - pesobot-uploads:/app/uploads
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pesobot-net

  # ========================================================================
  # PesoBot Frontend · UI tipo chat estilo banco LATAM
  # ========================================================================
  pesobot-frontend:
    image: nginx:alpine
    container_name: pesobot-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./pesobot-frontend/public:/usr/share/nginx/html:ro
      - ./pesobot-frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - pesobot-api
    networks:
      - pesobot-net

  # ========================================================================
  # Qdrant · Vector DB para el RAG de PesoBot (manuales internos)
  # ========================================================================
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: pesobot-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant-storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pesobot-net

  # ========================================================================
  # Redis · Cache + queue para procesar PDFs de "quejas" (RAG poisoning vector)
  # ========================================================================
  redis:
    image: redis:7-alpine
    container_name: pesobot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - pesobot-net

# ============================================================================
# Volúmenes persistentes
# ============================================================================
volumes:
  pesobot-uploads:
    driver: local
  qdrant-storage:
    driver: local
  redis-data:
    driver: local

# ============================================================================
# Red interna
# ============================================================================
networks:
  pesobot-net:
    driver: bridge
